name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # กดปุ่ม Run ใน GitHub Actions ได้เลย

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js & build web app ────────────────────────────────────
      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install npm dependencies
        run: npm ci

      - name: 🏗️ Build web app (Vite)
        run: npm run build

      # ── 3. Sync Capacitor → Android ─────────────────────────────────────────
      - name: 🔄 Sync Capacitor to Android
        run: npx cap sync android

      # ── 4. Setup Java & Android SDK ─────────────────────────────────────────
      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📱 Install required SDK components
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;35.0.1" 2>&1 | tail -5

      # ── 5. Configure local build ─────────────────────────────────────────────
      - name: ⚙️ Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      # ── 6. Build APK ─────────────────────────────────────────────────────────
      - name: 🔨 Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      # ── 7. Upload artifact ───────────────────────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BoomRider-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 8. Show download info ────────────────────────────────────────────────
      - name: ✅ Build complete
        run: |
          echo "================================================================"
          echo "✅ APK built successfully!"
          echo "📥 Download from: Actions tab → This workflow run → Artifacts"
          echo "================================================================"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
